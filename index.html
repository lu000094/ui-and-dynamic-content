<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Quest Log</title>

    <!-- Cinzel (engraved caps) for headings, EB Garamond for body -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
  </head>

  <body>
    <main class="page">
      <section class="widget">

        <!-- ============== MASTHEAD: scroll = title + tagline ============== -->
        <header class="banner">
          <h1 class="widget__title">The Quest Log</h1>
          <p class="widget__subtitle">Every legend begins with a single quest</p>
        </header>

        <!-- ===================== PANEL: main content ===================== -->
        <div class="panel">
          <p class="prompt">What quest awaits thee, traveller?</p>

          <!-- input, then button stacked UNDERNEATH it -->
          <div class="entry">
            <label class="visually-hidden" for="item-input">New quest</label>
            <input type="text"
                   id="item-input"
                   class="entry__input"
                   placeholder="Inscribe thy next quest&hellip;"
                   autocomplete="off">
            <button type="button" id="add-button" class="entry__button">Inscribe Quest</button>
          </div>

          <!-- Paragraph for error / feedback messages -->
          <p class="feedback" id="feedback" role="alert" aria-live="polite"></p>

          <!-- User input gets appended here as list-items -->
          <ul class="todo-list" id="todo-list"></ul>

          <!-- ======================= FOOTER ======================= -->
          <footer class="footer">
            <span class="footer__rule" aria-hidden="true"></span>
            <nav class="footer__links" aria-label="Guild halls">
              <a class="footer__link" href="#" aria-label="Twitter / X">

              </a>
              <a class="footer__link" href="#" aria-label="Instagram">
                <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M12 2.16c3.2 0 3.58.01 4.85.07 1.17.05 1.8.25 2.23.41.56.22.96.48 1.38.9.42.42.68.82.9 1.38.16.42.36 1.06.41 2.23.06 1.27.07 1.65.07 4.85s-.01 3.58-.07 4.85c-.05 1.17-.25 1.8-.41 2.23-.22.56-.48.96-.9 1.38-.42.42-.82.68-1.38.9-.42.16-1.06.36-2.23.41-1.27.06-1.65.07-4.85.07s-3.58-.01-4.85-.07c-1.17-.05-1.8-.25-2.23-.41a3.7 3.7 0 0 1-1.38-.9 3.7 3.7 0 0 1-.9-1.38c-.16-.42-.36-1.06-.41-2.23C2.17 15.58 2.16 15.2 2.16 12s.01-3.58.07-4.85c.05-1.17.25-1.8.41-2.23.22-.56.48-.96.9-1.38.42-.42.82-.68 1.38-.9.42-.16 1.06-.36 2.23-.41C8.42 2.17 8.8 2.16 12 2.16Zm0 1.62c-3.15 0-3.52.01-4.76.07-1.15.05-1.77.24-2.19.41-.55.21-.94.47-1.35.88-.41.41-.67.8-.88 1.35-.17.42-.36 1.04-.41 2.19-.06 1.24-.07 1.61-.07 4.76s.01 3.52.07 4.76c.05 1.15.24 1.77.41 2.19.21.55.47.94.88 1.35.41.41.8.67 1.35.88.42.17 1.04.36 2.19.41 1.24.06 1.61.07 4.76.07s3.52-.01 4.76-.07c1.15-.05 1.77-.24 2.19-.41.55-.21.94-.47 1.35-.88.41-.41.67-.8.88-1.35.17-.42.36-1.04.41-2.19.06-1.24.07-1.61.07-4.76s-.01-3.52-.07-4.76c-.05-1.15-.24-1.77-.41-2.19a3.6 3.6 0 0 0-.88-1.35 3.6 3.6 0 0 0-1.35-.88c-.42-.17-1.04-.36-2.19-.41-1.24-.06-1.61-.07-4.76-.07Zm0 2.76a5.46 5.46 0 1 1 0 10.92 5.46 5.46 0 0 1 0-10.92Zm0 9a3.54 3.54 0 1 0 0-7.08 3.54 3.54 0 0 0 0 7.08Zm6.95-9.22a1.28 1.28 0 1 1-2.55 0 1.28 1.28 0 0 1 2.55 0Z"/></svg>

              </a>
            </nav>
          </footer>

        </div>
      </section>
    </main>

    <script src="js/script.js"></script>
  </body>
</html>
