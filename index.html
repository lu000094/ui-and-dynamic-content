<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Quest List</title>

    <!-- Cinzel (engraved caps) for headings, EB Garamond for body -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
  </head>

  <body>
    <main class="page">
      <section class="widget">

        <!- Masthead: title and tagline->
        <header class="banner">
          <h1 class="widget__title">The Quest List</h1>
          <p class="widget__subtitle">Every legend begins with a single quest</p>
        </header>

        <!-- Panel: main content -->
        <div class="panel">
          <p class="prompt">What quest awaits thee, traveller?</p>

          <!-- input, then button stacked UNDERNEATH it -->
          <div class="entry">
            <label class="visually-hidden" for="item-input">New quest</label>
            <input type="text"
                   id="item-input"
                   class="entry__input"
                   placeholder="Inscribe thy next quest&hellip;"
                   autocomplete="off">
            <button type="button" id="add-button" class="entry__button">Inscribe Quest</button>
          </div>

          <!-- Paragraph for error / feedback messages -->
          <p class="feedback" id="feedback" role="alert" aria-live="polite"></p>

          <!-- User input gets appended here as list-items -->
          <ul class="todo-list" id="todo-list"></ul>

          <!--Footer-->
          <footer class="footer">
            <span class="footer__rule" aria-hidden="true"></span>
            <nav class="footer__links" aria-label="Guild halls">
              <a class="footer__link" href="#" aria-label="Twitter / X">
                <img src="img/icons/x.png" alt="X" width="20" height="20">
              </a>
              <a class="footer__link" href="#" aria-label="Instagram">
                <img src="img/icons/instagram.png" alt="Instagram" width="20" height="20">
              </a>
              <a class="footer__link" href="#" aria-label="GitHub">
                <img src="img/icons/github.png" alt="GitHub" width="20" height="20">
              </a>
            </nav>
          </footer>

        </div>
      </section>
    </main>

    <script src="js/script.js"></script>
  </body>
</html>
